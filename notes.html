<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arc Cashflow - Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">  
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">  
<style>
  /* ══════════════════════════
     THEMING & VARIABLES (ARC CORE DESIGN)
     ══════════════════════════ */
  :root {
    --bg: #08080a;
    --card-light-1: #dadcdf;
    --card-light-2: #bcbfc3;
    --panel-bg: #0a0a0e;
    --blue: #2d63d8;
    --blue-soft: #5b8bf7;
    --ink: #15161a;
    --green: #0e9870;
    --red: #d43838;
    --muted: #4a4a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: url("bg.png") center/cover no-repeat fixed;
    background-color: var(--bg);
    min-height: 100vh;
    padding: 15px 15px 100px;
    font-family: 'Inter', sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 750px;
    position: relative;
  }

  .text-stroke {
    -webkit-text-stroke: 0.5px #000000;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
  }

  /* ── HEADER ── */
  .header {
    background: var(--panel-bg);
    border: 2px solid var(--blue);
    border-radius: 24px;
    padding: 18px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .app-title { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--blue-soft); }
  .update-badge { font-size: 11px; opacity: 0.6; }
  .month-label { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-top: 4px; }
  .header-count { font-size: 11px; background: rgba(45,99,216,0.15); border: 1px solid var(--blue); border-radius: 8px; padding: 4px 10px; color: var(--blue-soft); font-weight: 700; }

  /* ── PANEL DESIGN & ADD TOP BUTTON ── */
  .section { margin-bottom: 18px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; margin-bottom: 12px; color: var(--blue-soft); text-align: center; }
  .panel-card { background: var(--panel-bg); border: 2px solid var(--blue); border-radius: 28px; padding: 22px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }

  .add-top-btn {
    width: 100%;
    background: linear-gradient(150deg, var(--card-light-1), var(--card-light-2));
    border: none;
    border-radius: 20px;
    padding: 20px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.1s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }
  .add-top-btn:active { transform: scale(0.98); }
  .add-top-icon {
    width: 32px; height: 32px;
    background: var(--ink);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    color: #fff;
    font-weight: 700;
  }
  .add-top-text { font-size: 13px; font-weight: 800; color: var(--ink); letter-spacing: 0.5px; text-transform: uppercase; }
  .add-top-sub { font-size: 11px; color: var(--ink); opacity: 0.6; font-weight: 600; }

  /* ── NOTES CONTAINER & CARDS ── */
  .notes-list { display: flex; flex-direction: column; gap: 12px; }
  
  .note-card {
    background: #111217;
    border: 1px solid #222;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    animation: slideIn 0.25s cubic-bezier(.4,0,.2,1);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  
  .note-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-bottom: 1px solid #1c1d24;
    background: rgba(255,255,255,0.02);
  }
  .note-title-text { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
  .note-actions { display: flex; gap: 6px; }
  
  .note-btn {
    background: #181a21;
    border: 1px solid #2d313f;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 10px;
    font-size: 12px;
    transition: background 0.15s, border-color 0.15s;
  }
  .note-btn:hover { background: #222633; border-color: var(--blue-soft); }
  .note-btn.del:hover { background: rgba(214,56,56,0.15); border-color: var(--red); }
  
  .note-body {
    padding: 16px 18px;
    font-size: 13px;
    color: #ccc;
    line-height: 1.6;
    min-height: 50px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .note-footer { padding: 0 18px 14px; font-size: 11px; color: var(--muted); font-weight: 600; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 40px 20px; color: var(--blue-soft); font-weight: 700; font-size: 13px; }
  .empty-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.6; }
  .empty-sub { font-size: 11px; color: #666; margin-top: 4px; font-weight: 500; }

  /* ── SYSTEM MODAL (DARK THEME & GLASS EFFECT) ── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(5,6,8,0.85);
    backdrop-filter: blur(8px);
    z-index: 2100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    width: 100%;
    max-width: 550px;
    background: var(--panel-bg);
    border-radius: 32px 32px 0 0;
    border-top: 2px solid var(--blue);
    padding: 24px 24px 36px;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 5px; background: #222; border-radius: 99px; margin: 0 auto 20px; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--blue-soft); margin-bottom: 18px; }
  
  .modal-input {
    width: 100%; background: #111217; border: 1px solid #222; border-radius: 14px; padding: 14px; 
    color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; outline: none; margin-bottom: 12px; transition: border-color 0.2s;
  }
  .modal-input:focus { border-color: var(--blue); }
  
  .modal-textarea {
    width: 100%; background: #111217; border: 1px solid #222; border-radius: 14px; padding: 14px; 
    color: #ccc; font-family: 'Inter', sans-serif; font-size: 13px; outline: none; resize: none; height: 140px; line-height: 1.6; margin-bottom: 20px; transition: border-color 0.2s;
  }
  .modal-textarea:focus { border-color: var(--blue); }
  
  .modal-row { display: flex; gap: 12px; }
  .modal-cancel {
    flex: 1; padding: 14px; background: #111217; border: 1px solid #222; border-radius: 14px; 
    color: #aaa; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .modal-cancel:hover { background: #161822; }
  
  .modal-save {
    flex: 2; padding: 14px; background: var(--blue); border: none; border-radius: 14px; 
    color: white; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .modal-save:active { transform: scale(0.97); opacity: 0.88; }

  /* ══════════════════════════
     FLOATING NAV ORB SYSTEM WITH STAGGER ANIMATION
     ══════════════════════════ */
  .nav-container { position: fixed; left: 20px; top: 50%; transform: translateY(-50%); z-index: 2000; display: flex; align-items: center; touch-action: none; }
  
  .nav-orb { 
    width: 56px; height: 56px; cursor: grab; background: rgba(16, 18, 24, 0.9); 
    border: 2px solid var(--blue); border-radius: 50%; display: flex; align-items: center; 
    justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: transform 0.2s ease; 
  }
  .nav-orb:active { cursor: grabbing; transform: scale(0.95); }
  .nav-orb img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
  .nav-orb.spin { transform: rotate(360deg); transition: transform 0.6s cubic-bezier(.4,0,.2,1); }

  .nav-menu { position: absolute; left: 70px; display: flex; flex-direction: column; gap: 9px; pointer-events: none; }
  
  .nav-menu a { 
    background: #101218; border: 1px solid var(--blue); color: #eef2ff; font-weight: 600; font-size: 13px; 
    text-decoration: none; padding: 10px 18px; border-radius: 999px; white-space: nowrap; 
    box-shadow: 0 6px 14px rgba(0,0,0,0.4); display: flex; align-items: center; gap: 8px;
    opacity: 0; transform: translateX(-20px); 
    transition: opacity 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
  }
  .nav-menu a:hover { background: #1a1d27; color: var(--blue-soft); }

  .nav-menu.open { pointer-events: auto; }
  .nav-menu.open a { opacity: 1; transform: translateX(0); }

  /* STAGGERED DELAY LOGIC */
  .nav-menu.open a:nth-child(1) { transition-delay: 0.05s; }
  .nav-menu.open a:nth-child(2) { transition-delay: 0.12s; }
  .nav-menu.open a:nth-child(3) { transition-delay: 0.19s; }
  .nav-menu.open a:nth-child(4) { transition-delay: 0.26s; }
  .nav-menu.open a:nth-child(5) { transition-delay: 0.33s; }
  .nav-menu:not(.open) a { transition-delay: 0s !important; }
</style>
</head>
<body>

<div class="nav-container" id="navContainer">
  <div class="nav-orb" id="navOrb"><img src="icon.png" alt="Logo"></div>
  <div class="nav-menu" id="navMenu">
    <a href="index.html">  Dashboard</a>
    <a href="history.html">  Riwayat Duit</a>
    <a href="billing.html">  Tagihan Utang</a>
    <a href="utang.html">  Utang</a>
    <a href="grafik.html">  Grafik</a>
  </div>
</div>

<div class="container">

  <div class="header">
    <div>
      <span class="app-title">ARC CASHFLOW ANALYTICS</span>
      <div class="month-label">Notes System</div>
    </div>
    <div style="text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
      <span class="update-badge" id="headerDate">—</span>
      <div class="header-count" id="noteCount">0 Catatan</div>
    </div>
  </div>

  <div class="section">
    <div class="panel-card" style="padding: 16px;">
      <button class="add-top-btn" onclick="openModal()">
        <div class="add-top-icon">+</div>
        <div class="add-top-text">Tambah Notes Baru</div>
        <div class="add-top-sub">Ketuk untuk mencatat log keuangan penting</div>
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Semua Catatan</div>
    <div class="notes-list" id="notesList">
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div>Belum Ada Catatan Terdeteksi</div>
        <div class="empty-sub">Gunakan tombol di atas untuk membuat catatan baru.</div>
      </div>
    </div>
  </div>

</div>

<div class="modal-backdrop" id="modalBackdrop" onclick="backdropClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Catatan Baru</div>
    <input class="modal-input" id="inputTitle" placeholder="Judul catatan..." maxlength="60">
    <textarea class="modal-textarea" id="inputBody" placeholder="Tulis isi catatan di sini..."></textarea>
    <div class="modal-row">
      <button class="modal-cancel" onclick="closeModal()">Batal</button>
      <button class="modal-save" onclick="saveNote()">Simpan</button>
    </div>
  </div>
</div>

<script>
let notes = JSON.parse(localStorage.getItem('notes_data') || '[]');
let editingId = null;

const BULAN = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Ags','Sep','Okt','Nov','Des'];

function init() {
  const now = new Date();
  document.getElementById('headerDate').textContent =
    'UPD ' + String(now.getDate()).padStart(2,'0') + '/' +
    String(now.getMonth()+1).padStart(2,'0') + '/' + now.getFullYear();
  render();
}

function openModal(id) {
  editingId = id || null;
  const title = document.getElementById('inputTitle');
  const body = document.getElementById('inputBody');
  const modalTitle = document.getElementById('modalTitle');

  if (id) {
    const note = notes.find(n => n.id === id);
    title.value = note.title;
    body.value = note.body;
    modalTitle.textContent = 'Edit Catatan';
  } else {
    title.value = '';
    body.value = '';
    modalTitle.textContent = 'Catatan Baru';
  }

  document.getElementById('modalBackdrop').classList.add('open');
  setTimeout(() => title.focus(), 320);
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  editingId = null;
}

function backdropClick(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModal();
}

function saveNote() {
  const title = document.getElementById('inputTitle').value.trim();
  const body = document.getElementById('inputBody').value.trim();
  if (!title && !body) { alert('Isi judul atau isi catatan coo!'); return; }

  const now = new Date();
  const dateStr = String(now.getDate()).padStart(2,'0') + ' ' +
    BULAN[now.getMonth()] + ' ' + now.getFullYear() + ', ' +
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  if (editingId) {
    const idx = notes.findIndex(n => n.id === editingId);
    notes[idx] = { ...notes[idx], title: title || 'Tanpa Judul', body, date: dateStr };
  } else {
    notes.unshift({ id: Date.now().toString(), title: title || 'Tanpa Judul', body, date: dateStr });
  }

  localStorage.setItem('notes_data', JSON.stringify(notes));
  closeModal();
  render();
}

function deleteNote(id) {
  if (!confirm('Hapus catatan ini coo?')) return;
  notes = notes.filter(n => n.id !== id);
  localStorage.setItem('notes_data', JSON.stringify(notes));
  render();
}

function render() {
  const list = document.getElementById('notesList');
  document.getElementById('noteCount').textContent = notes.length + ' Catatan';

  if (notes.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div>Belum Ada Catatan Terdeteksi</div>
        <div class="empty-sub">Gunakan tombol di atas untuk membuat catatan baru.</div>
      </div>`;
    return;
  }

  list.innerHTML = notes.map(n => `
    <div class="note-card" id="card-${n.id}">
      <div class="note-header">
        <span class="note-title-text">${escHtml(n.title)}</span>
        <div class="note-actions">
          <button class="note-btn" onclick="openModal('${n.id}')" title="Edit">✏️</button>
          <button class="note-btn del" onclick="deleteNote('${n.id}')" title="Hapus">🗑️</button>
        </div>
      </div>
      <div class="note-body">${escHtml(n.body) || '<span style="opacity:0.3;font-style:italic;">Tanpa isi</span>'}</div>
      <div class="note-footer">${n.date}</div>
    </div>
  `).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ══════════════════════════
   DRAGGABLE & SPIN STAGGER NAV LOGIC (ARC SINKRON ENGINE)
   ══════════════════════════ */
const container = document.getElementById('navContainer');
const orb = document.getElementById('navOrb');
const menu = document.getElementById('navMenu');
let isDragging = false, startX, startY, initialX, initialY, hasMoved = false;

orb.addEventListener('pointerdown', (e) => {
    isDragging = true; hasMoved = false;
    startX = e.clientX; startY = e.clientY;
    const rect = container.getBoundingClientRect();
    initialX = rect.left; initialY = rect.top;
    container.style.transform = 'none';
    container.style.top = initialY + 'px'; container.style.left = initialX + 'px';
    orb.setPointerCapture(e.pointerId);
});

orb.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - startX; const dy = e.clientY - startY;
    if (Math.abs(dx) > 5 || Math.abs(dy) > 5) hasMoved = true;
    let newX = Math.max(0, Math.min(window.innerWidth - 60, initialX + dx));
    let newY = Math.max(0, Math.min(window.innerHeight - 60, initialY + dy));
    container.style.left = newX + 'px'; container.style.top = newY + 'px';
    if (newX > window.innerWidth / 2) { menu.style.left = 'auto'; menu.style.right = '70px'; } 
    else { menu.style.left = '70px'; menu.style.right = 'auto'; }
});

orb.addEventListener('pointerup', (e) => {
    if (!isDragging) return; isDragging = false; orb.releasePointerCapture(e.pointerId);
    if (!hasMoved) {
        orb.classList.add('spin');
        setTimeout(() => orb.classList.remove('spin'), 600);
        menu.classList.toggle('open');
    }
});

document.addEventListener('click', (e) => { if(!container.contains(e.target)) menu.classList.remove('open'); });

window.onload = init;
</script>
</body>
</html>
